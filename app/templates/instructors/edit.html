{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10">
        <h3 class="fw-bold mb-4 animate-fade-up">Edit Instructor</h3>
        <div class="card p-4 animate-fade-up delay-1">
            <form method="POST">
                <!-- Basic Info -->
                <h5 class="text-muted mb-3">Basic Information</h5>
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label">Full Name *</label>
                        <input type="text" name="name" class="form-control" value="{{ instructor.name }}" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Instructor ID</label>
                        <input type="text" name="instructor_id" class="form-control" value="{{ instructor.instructor_id or '' }}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Phone</label>
                        <input type="text" name="phone" class="form-control" value="{{ instructor.phone or '' }}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Instructor Status</label>
                        <select name="status" class="form-select">
                            <option value="New" {% if instructor.status == 'New' %}selected{% endif %}>New</option>
                            <option value="Current" {% if instructor.status == 'Current' %}selected{% endif %}>Current</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">CV URL</label>
                        <input type="url" name="cv_url" class="form-control" value="{{ instructor.cv_url or '' }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Video URL</label>
                        <input type="url" name="video_url" class="form-control" value="{{ instructor.video_url or '' }}">
                    </div>
                </div>

                <!-- Tracks & Profiles -->
                <h5 class="text-muted mb-3">Tracks & Profiles</h5>
                <div class="row g-3 mb-4">
                    {% for i in range(1, 4) %}
                    {% set current_track = tracks_dict.get(i) %}
                    <div class="col-md-4">
                        <label class="form-label">Track {{ i }} {% if i > 1 %}(Optional){% endif %}</label>
                        <select name="track_{{ i }}" id="track_{{ i }}" class="form-select edit-track" data-order="{{ i }}">
                            <option value="">Select Track...</option>
                            {% for track in tracks %}
                            <option value="{{ track.id }}" {% if current_track and current_track.track_id == track.id %}selected{% endif %}>{{ track.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Profile {{ i }}</label>
                        <select name="profile_{{ i }}" id="profile_{{ i }}" class="form-select" {% if not current_track %}disabled{% endif %}>
                            <option value="">Select Profile...</option>
                            {% if current_track %}
                                {% for p in current_track.track.profiles %}
                                <option value="{{ p.id }}" {% if current_track.profile_id == p.id %}selected{% endif %}>{{ p.name }}</option>
                                {% endfor %}
                            {% endif %}
                        </select>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        {% if i == 1 %}<span class="text-muted">Primary</span>{% endif %}
                    </div>
                    {% endfor %}
                </div>

                <!-- Evaluation & HR -->
                <h5 class="text-muted mb-3">Evaluation & Employment</h5>
                <div class="row g-3 mb-4">
                    <div class="col-md-3">
                        <label class="form-label">Rate/Hour (EGP)</label>
                        <input type="number" name="rate_per_hour" class="form-control" step="0.01" value="{{ instructor.rate_per_hour or '' }}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Employment Type</label>
                        <select name="employment_type" class="form-select">
                            <option value="">Select...</option>
                            <option {% if instructor.employment_type == 'Full Time' %}selected{% endif %}>Full Time</option>
                            <option {% if instructor.employment_type == 'Part Time' %}selected{% endif %}>Part Time</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Business Type</label>
                        <select name="business_type" class="form-select">
                            <option value="">Select...</option>
                            <option {% if instructor.business_type == 'B2B' %}selected{% endif %}>B2B</option>
                            <option {% if instructor.business_type == 'B2C' %}selected{% endif %}>B2C</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Technical Feedback</label>
                        <select name="technical_feedback" class="form-select">
                            <option value="">Select...</option>
                            <option {% if instructor.technical_feedback == 'Strong' %}selected{% endif %}>Strong</option>
                            <option {% if instructor.technical_feedback == 'Average' %}selected{% endif %}>Average</option>
                            <option {% if instructor.technical_feedback == 'Weak' %}selected{% endif %}>Weak</option>
                            <option {% if instructor.technical_feedback == 'Needs Improvement' %}selected{% endif %}>Needs Improvement</option>
                            <option {% if instructor.technical_feedback == 'Not Relevant' %}selected{% endif %}>Not Relevant</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">First Approval</label>
                        <select name="first_approval" class="form-select">
                            <option value="">Select...</option>
                            <option {% if instructor.first_approval == 'Approved' %}selected{% endif %}>Approved</option>
                            <option {% if instructor.first_approval == 'Rejected' %}selected{% endif %}>Rejected</option>
                            <option {% if instructor.first_approval == 'Pending' %}selected{% endif %}>Pending</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Second Approval</label>
                        <select name="second_approval" class="form-select">
                            <option value="">Select...</option>
                            <option {% if instructor.second_approval == 'Approved' %}selected{% endif %}>Approved</option>
                            <option {% if instructor.second_approval == 'Rejected' %}selected{% endif %}>Rejected</option>
                            <option {% if instructor.second_approval == 'Pending' %}selected{% endif %}>Pending</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Review Date</label>
                        <input type="date" name="review_date" class="form-control" value="{{ instructor.review_date }}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Reviewer</label>
                        <input type="text" name="reviewer_name" class="form-control" value="{{ instructor.reviewer_name or '' }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Assign to Hiring Plan</label>
                        <select name="plan_id" class="form-select">
                            <option value="">-- No Plan (Unassigned) --</option>
                            {% for plan in plans %}
                            <option value="{{ plan.id }}" {% if instructor.plan_id == plan.id %}selected{% endif %}>{{ plan.title }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Notes</label>
                        <textarea name="notes" class="form-control" rows="3">{{ instructor.notes or '' }}</textarea>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a href="{{ url_for('instructors.list_instructors') }}" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-accent"><i class="bi bi-check-lg me-1"></i>Update Instructor</button>
                </div>
            </form>
        </div>
    </div>
</div>


{% endblock %}
